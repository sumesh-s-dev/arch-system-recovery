name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  syntax:
    name: syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: make check

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: make shellcheck

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: make test

  manpage:
    name: manpage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manpage builds
        run: make man

  completions:
    name: completions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure completion files exist and are non-empty
        run: |
          test -s completions/arch-recovery.bash
          test -s completions/_arch-recovery
          test -s completions/arch-recovery.fish
