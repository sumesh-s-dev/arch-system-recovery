name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  syntax:
    name: syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make fish
      - name: Script syntax check
        run: make check

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make shellcheck
      - name: Run shellcheck
        run: make shellcheck

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make
      - name: Run unit tests
        run: make test

  manpage:
    name: manpage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make man-db groff
      - name: Validate manpage builds
        run: MANPAGER=cat PAGER=cat make man

  completions:
    name: completions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make
      - name: Ensure completion files exist and are non-empty
        run: |
          test -s completions/arch-recovery.bash
          test -s completions/_arch-recovery
          test -s completions/arch-recovery.fish

  arch-smoke:
    name: arch-smoke
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install git first
        run: pacman -Sy --noconfirm git
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm --needed \
            bash make fish man-db groff shellcheck
      - name: Syntax check
        run: make check
      - name: Unit tests
        run: make test
      - name: Manpage check
        run: MANPAGER=cat PAGER=cat make man
      - name: Completions check
        run: |
          test -s completions/arch-recovery.bash
          test -s completions/_arch-recovery
          test -s completions/arch-recovery.fish
