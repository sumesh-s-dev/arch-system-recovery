name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: publish-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make git openssh-client

      - name: Validate tag, notes, and release assets
        run: |
          set -euo pipefail
          version="$(bash bin/arch-recovery --version | awk '{print $2}')"
          notes_path="docs/releases/${GITHUB_REF_NAME}.md"
          manifest_path="docs/releases/${GITHUB_REF_NAME}.manifest"
          signature_path="${manifest_path}.sig"
          if [[ "v${version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match toolkit version v${version}" >&2
            exit 1
          fi
          [[ -f "${notes_path}" ]] || {
            echo "Missing release notes: ${notes_path}" >&2
            exit 1
          }
          [[ -f "${manifest_path}" ]] || {
            echo "Missing signed manifest: ${manifest_path}" >&2
            exit 1
          }
          [[ -f "${signature_path}" ]] || {
            echo "Missing signed manifest signature: ${signature_path}" >&2
            exit 1
          }

      - name: Verify signed release tag
        run: |
          set -euo pipefail
          git -c gpg.format=ssh \
              -c gpg.ssh.allowedSignersFile=keys/release_signers.allowed \
              tag -v "${GITHUB_REF_NAME}"

      - name: Build release bundle
        run: make dist

      - name: Verify signed release manifest
        run: |
          set -euo pipefail
          archive="dist/arch-system-recovery-${GITHUB_REF_NAME}.tar.gz"
          archive_checksum="${archive}.sha256"
          manifest="docs/releases/${GITHUB_REF_NAME}.manifest"
          signature="${manifest}.sig"
          principal="$(awk 'NF >= 2 {print $1; exit}' keys/release_signers.allowed)"
          diff -u "${archive_checksum}" "${manifest}"
          ssh-keygen -Y verify \
            -f keys/release_signers.allowed \
            -I "${principal}" \
            -n arch-recovery \
            -s "${signature}" \
            < "${manifest}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: docs/releases/${{ github.ref_name }}.md
          files: |
            dist/arch-system-recovery-${{ github.ref_name }}.tar.gz
            dist/arch-system-recovery-${{ github.ref_name }}.tar.gz.sha256
            docs/releases/${{ github.ref_name }}.manifest
            docs/releases/${{ github.ref_name }}.manifest.sig
          fail_on_unmatched_files: true
